        - checkbox "abstract" [ref=e142]
        - paragraph: "This paper studies how to use microeconomic data on beliefs and prices to identify the relative contributions of pricing and information frictions to monetary non-neutrality. In a canonical general equilibrium model with both pricing frictions and information acquisition, we analytically characterize how these frictions contribute to non-neutrality. Exploiting this characterization, we show that data on the cross-sectional distributions of uncertainty and pricing durations are necessary and sufficient to identify non-neutrality. Implementing our approach in survey data, we find that: (i) information and pricing frictions are approximately equally important, and (ii) assuming exogenous information would overstate non-neutrality by 60%."
