        - checkbox "abstract" [ref=e169]
        - paragraph: Using a novel dataset on U.S. residential land development, we document that the average time-to-develop (TTD) for residential properties—which includes both the time spent preparing land infrastructures and construction—is about three years, with significant geographic variation. Incorporating these lengthy and dispersed TTDs into a housing investment model, we find that short-run housing supply elasticities differ markedly from long-run elasticities, influencing housing market dynamics over the business cycle. Our empirical analysis reveals that short-run elasticities can account for local house price variations more effectively than long-run measures during the 2010s housing recovery and the COVID housing boom. Furthermore, we demonstrate through our model that regions with a wider gap between the short- and long-run elasticities via lengthy TTD experience delayed supply responses, limiting the immediate effectiveness of supply policies aimed at stabilizing house prices but enhancing their medium-term impact.
