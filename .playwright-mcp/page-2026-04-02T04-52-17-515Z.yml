        - paragraph: We set-up a two-sector New Keynesian model with input-output linkages and monetary-fiscal policy interactions to study the post-COVID-19 inflation. We test alternative calibrations of the model based on the fit of aggregate inflation, using shock estimates obtained by fitting goods inflation. Our preferred model suggests that fiscal shocks not offset by monetary policy account for the initial inflation surge in the first half of 2021 while supply-side shocks have emerged as main drivers of inflation since then. Multiple factors (“supply-side disruption”, “expansionary policy”, and “sectoral reallocation shock”) played an important role at different phases of the recent inflationary episode.
