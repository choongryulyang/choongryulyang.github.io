        - checkbox "abstract" [ref=e153]
        - paragraph: Since 2000, the U.S. labor share and job reallocation rate have both fallen. We ask whether rising labor adjustment frictions can help explain this joint decline. We document a rise in establishment inaction and a shift toward smaller conditional employment changes, patterns consistent with kinked adjustment costs. In state-industry data, larger reallocation declines are associated with larger payroll-share declines, and the same cells with larger increases in establishment-level inaction also show larger declines in firm-level job reallocation and payroll shares. A calibrated firm-dynamics model disciplined by inaction can account for a meaningful share of both aggregate declines over the sample period.
